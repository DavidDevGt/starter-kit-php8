services:

  # ── PHP-FPM application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: saas_app
    restart: unless-stopped
    user: "www-data"
    environment:
      APP_ENV:    ${APP_ENV:-production}
      APP_KEY:    ${APP_KEY}
      DB_HOST:    db
      DB_PORT:    3306
      DB_NAME:    ${DB_NAME}
      DB_USER:    ${DB_USER}
      DB_PASS:    ${DB_PASS}
      REDIS_HOST: cache
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      # Storage writable; everything else read-only
      - app-storage:/var/www/html/storage
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  # ── Nginx reverse proxy ──────────────────────────────────────────────────
  web:
    image: nginx:1.25-alpine
    container_name: saas_web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Serve static assets directly — no need to hit PHP-FPM
      - ./public:/var/www/html/public:ro
      - ./src:/var/www/html/src:ro
    networks:
      - backend
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  # ── MySQL 8.0 ────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: saas_db
    restart: unless-stopped
    # No ports: intentionally unexposed — only reachable on backend network
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASS}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/zz-custom.cnf:ro
    networks:
      - backend
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - --host=localhost
        - --user=${DB_USER}
        - --password=${DB_PASS}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  # ── Redis (sessions, rate-limiting, future queues) ───────────────────────
  cache:
    image: redis:7-alpine
    container_name: saas_cache
    restart: unless-stopped
    # No ports: intentionally unexposed
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test:
        - CMD
        - redis-cli
        - --no-auth-warning
        - -a
        - ${REDIS_PASSWORD}
        - ping
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── Mailpit (catch-all SMTP for development) ─────────────────────────────
  mail:
    image: axllent/mailpit:latest
    container_name: saas_mail
    restart: unless-stopped
    ports:
      # Web UI only — SMTP port 1025 stays internal
      - "${MAILPIT_PORT:-8025}:8025"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
    name: saas-backend
    # DB and Redis have no exposed ports; isolation via network + no bindings

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  db-data:
    name: saas_db_data
  redis-data:
    name: saas_redis_data
  app-storage:
    name: saas_app_storage
