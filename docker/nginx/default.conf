server {
    listen       80;
    server_name  _;

    root  /var/www/html/public;
    index index.php;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options    "nosniff"                      always;
    add_header X-XSS-Protection          "1; mode=block"                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Static assets — served directly by Nginx, long cache ──────────────
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|css|js|woff|woff2|ttf|eot)$ {
        expires        1y;
        add_header     Cache-Control "public, immutable";
        access_log     off;
        log_not_found  off;
    }

    # ── Favicon & robots — silent 404 ─────────────────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── MVC router — every unknown URI → index.php ────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ────────────────────────────────────────────────────────────
    location ~ \.php$ {
        # Prevent executing uploaded files as PHP
        try_files $uri =404;

        fastcgi_pass   app:9000;
        fastcgi_index  index.php;

        fastcgi_param  SCRIPT_FILENAME  $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # Strip X-Powered-By from PHP responses
        fastcgi_hide_header X-Powered-By;

        # Timeouts
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout    60s;
        fastcgi_read_timeout    60s;

        # Buffers
        fastcgi_buffer_size    128k;
        fastcgi_buffers        4 256k;
        fastcgi_busy_buffers_size 256k;

        # Intercept PHP errors (so Nginx can serve the error page)
        fastcgi_intercept_errors on;
    }

    # ── Deny access to hidden files and sensitive extensions ──────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|log|sql|conf|lock|json|md)$ {
        deny          all;
        access_log    off;
        log_not_found off;
    }

    # ── Custom error pages ─────────────────────────────────────────────────
    error_page 404 /index.php;
    error_page 500 502 503 504 /index.php;
}
