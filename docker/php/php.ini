[PHP]
; ── Exposure ──────────────────────────────────────────────────────────────────
expose_php                  = Off

; ── Error handling (logs → stderr for Docker) ─────────────────────────────────
error_reporting             = E_ALL
display_errors              = Off
display_startup_errors      = Off
log_errors                  = On
error_log                   = /dev/stderr
ignore_repeated_errors      = Off

; ── Limits ────────────────────────────────────────────────────────────────────
memory_limit                = 256M
max_execution_time          = 30
max_input_time              = 60
max_input_vars              = 1000

; ── Uploads ───────────────────────────────────────────────────────────────────
post_max_size               = 20M
upload_max_filesize         = 20M

; ── Session security ──────────────────────────────────────────────────────────
session.cookie_httponly     = 1
session.cookie_secure       = 1
session.use_strict_mode     = 1
session.use_only_cookies    = 1
session.gc_maxlifetime      = 1440
session.cookie_samesite     = Strict

; ── URL stream wrappers ───────────────────────────────────────────────────────
allow_url_fopen             = Off
allow_url_include           = Off

; ── Open basedir (restrict file access to app root + tmp) ─────────────────────
open_basedir                = /var/www/html:/tmp

; ── Disable dangerous shell / introspection functions ─────────────────────────
disable_functions           = passthru,exec,system,shell_exec,proc_open,proc_close,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; ── Timezone ──────────────────────────────────────────────────────────────────
date.timezone               = America/Guatemala

; ── Default charset ───────────────────────────────────────────────────────────
default_charset             = UTF-8
