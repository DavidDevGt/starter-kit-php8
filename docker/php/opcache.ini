[opcache]
; ── Enable ────────────────────────────────────────────────────────────────────
opcache.enable                 = 1
opcache.enable_cli             = 0

; ── Memory ────────────────────────────────────────────────────────────────────
opcache.memory_consumption     = 256
opcache.interned_strings_buffer= 16

; ── File cache ────────────────────────────────────────────────────────────────
opcache.max_accelerated_files  = 20000
opcache.max_wasted_percentage  = 5

; ── Revalidation — DISABLE in production, ENABLE in dev ──────────────────────
; In production images, source never changes at runtime → no need to stat files.
; If you mount source via volume in dev, set validate_timestamps=1.
opcache.validate_timestamps    = 0
opcache.revalidate_freq        = 0

; ── Stability ─────────────────────────────────────────────────────────────────
opcache.save_comments          = 1   ; needed by Doctrine/annotations, Symfony
opcache.fast_shutdown          = 1

; ── JIT (PHP 8+) ──────────────────────────────────────────────────────────────
; "tracing" mode gives best throughput for typical web workloads.
; Disable (jit=0) if you experience instability with specific extensions.
opcache.jit                    = tracing
opcache.jit_buffer_size        = 100M
