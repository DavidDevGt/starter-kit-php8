; ── Pool: www ─────────────────────────────────────────────────────────────────
[www]

; Run as non-root
user  = www-data
group = www-data

; Listen on TCP (required for cross-container communication via Docker network)
listen = 0.0.0.0:9000

; ── Process management ────────────────────────────────────────────────────────
; "dynamic" adjusts workers based on load.
; For predictable containers, "static" is acceptable if you know your concurrency.
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests      = 500   ; Restart workers after N requests to prevent memory leaks

; ── Timeouts ──────────────────────────────────────────────────────────────────
request_terminate_timeout = 60s
request_slowlog_timeout   = 5s

; ── Logging → stderr (Docker-standard) ───────────────────────────────────────
; php_flag[display_errors]  = off inherited from php.ini
access.log   = /dev/null          ; Nginx already logs requests — avoid duplication
slowlog      = /dev/stderr
catch_workers_output = yes

; ── Environment passthrough ───────────────────────────────────────────────────
; Allows $_ENV to work inside FPM workers
clear_env = no
